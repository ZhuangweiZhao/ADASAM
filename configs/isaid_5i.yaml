# AdaSAM Stage 2 — iSAID-5i Few-shot Semantic Learning 配置
# ==========================================================================
# 基于 base.yaml, 覆盖数据/小样本参数。Inherits from base.yaml; overrides data/fewshot.

# ── Backbone (MobileSAM, frozen) ──
backbone:
  model_type: vit_t
  checkpoint: weights/mobile_sam.pt
  image_size: 1024

# ── Data (iSAID-5i Few-shot Segmentation) ──
data:
  data_root: data/iSAID-5i
  tile_size: 256
  num_classes: 15
  fold: 0

# ── Few-shot episode ──
fewshot:
  k_shot: 5
  min_tiles: 10

# ── Support Encoder ──
support_encoder:
  embed_dim: 256
  n_support_tokens: 16
  n_memory_tokens: 64
  n_encoder_layers: 2
  n_heads: 8
  ffn_dim: 1024
  dropout: 0.0

# ── Semantic Prior Generator (SPG) ──
semantic_prior:
  num_probes: 16             # internal semantic probe count (implementation detail)
  num_layers: 3
  num_heads: 8
  ffn_dim: 1024
  dropout: 0.0
  use_feedback: true

# ── Geometric Prior (dual-branch) ──
geometric_prior:
  enabled: true
  embed_dim: 256

# ── Prompt Fusion (dual-branch merge) ──
prompt_fusion:
  enabled: true
  mode: "concat"             # concat | add | gated

# ── SAM Decoder (boundary refinement) ──
decoder:
  train_mask_decoder: true

# ── Loss: L = L_main + λ₁·L_prior + λ₂·L_reg ──
loss:
  prior_weight: 0.3          # λ₁ for L_prior (SPG prior deep supervision)
  reg_weight: 0.0            # λ₂ for L_reg (reserved)
  focal_weight: 1.0
  dice_weight: 1.0
  focal_gamma: 5.0
  focal_eps: 1.0e-4

# ── Training ──
train:
  epochs: 50
  episodes_per_epoch: 200
  lr: 1.0e-4
  sam_decoder_lr_mult: 0.1
  weight_decay: 1.0e-4
  grad_clip: 1.0
  val_every: 5
  val_samples: 100
  device: cuda

# ── Evaluation ──
eval:
  score_thr: 0.3

# ── Reproducibility ──
seed: 42
output_dir: runs

# ── Debug trace ──
debug:
  enabled: false
  level: 2
  log_every: 50
