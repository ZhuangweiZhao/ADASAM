# AdaSAM base configuration | 基础配置
# =====================================
# iSAID-5i Stage 2 语义小样本分割的默认配置, 被 isaid_5i.yaml 继承覆盖。
# Default config for Stage 2 few-shot semantic segmentation; overridden by isaid_5i.yaml.

# ── Backbone (MobileSAM, frozen) ──
backbone:
  model_type: vit_t
  checkpoint: weights/mobile_sam.pt
  image_size: 1024

# ── Data (iSAID-5i Few-shot Semantic Segmentation) ──
data:
  data_root: data/iSAID-5i
  tile_size: 256
  num_classes: 15
  fold: 0

# ── Few-shot episode ──
fewshot:
  k_shot: 5
  min_tiles: 30

# ── Support Encoder ──
support_encoder:
  embed_dim: 256
  n_support_tokens: 16
  n_memory_tokens: 64
  n_encoder_layers: 2
  n_heads: 8
  ffn_dim: 1024
  dropout: 0.0

# ── Semantic Prior Generator (核心创新 | core innovation) ──
# 内部使用 N 个可学习语义探针 (Mask2Former-style masked cross-attention),
# 聚合后输出统一的 semantic prior + prior_mask。
# Internally uses N learnable semantic probes (Mask2Former-style), aggregated to
# unified semantic prior + prior_mask. Dense prompt / sparse token by PromptFusion.
semantic_prior:
  num_probes: 64
  num_layers: 3
  num_heads: 8
  ffn_dim: 1024
  dropout: 0.0
  use_feedback: true

# ── Geometric Prior (dual-branch: support-query cosine similarity) ──
geometric_prior:
  enabled: true
  embed_dim: 256

# ── Prompt Fusion (merge geometric + semantic priors) ──
prompt_fusion:
  enabled: true
  mode: "concat"

# ── SAM Decoder (boundary refinement) ──
decoder:
  train_mask_decoder: true

# ── Loss: L = L_main + λ₁·L_prior + λ₂·L_reg ──
loss:
  prior_weight: 0.3          # L_prior: SPG prior BCE+Dice deep supervision
  reg_weight: 0.0            # L_reg: regularization (reserved)
  focal_weight: 1.0
  dice_weight: 1.0
  focal_gamma: 5.0
  focal_eps: 1.0e-4

# ── Training ──
train:
  epochs: 50
  episodes_per_epoch: 200
  lr: 1.0e-4
  sam_decoder_lr_mult: 0.1
  weight_decay: 1.0e-4
  grad_clip: 1.0
  device: cuda

# ── Evaluation ──
eval:
  score_thr: 0.3

# ── Reproducibility ──
seed: 42
output_dir: runs
