# AdaSAM iSAID-5i Baseline — 纯 DPG + SupportEncoder + SAM Decoder
# SAM-RSP 创新 (coarse_prior + feedback) 全部关闭
# 与 isaid_5i.yaml 完全一致, 仅关闭 coarse_prior 和 feedback
# [NOTE] This config is for A/B experiments; use isaid_5i.yaml as the primary config.

backbone:
  model_type: vit_t
  checkpoint: weights/mobile_sam.pt
  image_size: 1024

data:
  data_root: data/iSAID-5i
  tile_size: 256
  num_classes: 15
  fold: 0

fewshot:
  k_shot: 5
  min_tiles: 10
  train_mode: novel

support_encoder:
  embed_dim: 256
  n_support_tokens: 16
  n_memory_tokens: 64
  n_encoder_layers: 2
  n_heads: 8
  ffn_dim: 1024
  dropout: 0.0

prompt_generator:
  num_probes: 16
  num_layers: 3
  num_heads: 8
  ffn_dim: 1024
  dropout: 0.0
  use_coarse_prior: false       # ← OFF
  use_feedback: false            # ← OFF

decoder:
  train_mask_decoder: true
  decode_chunk_size: 0

# Semantic segmentation loss (CE + Focal + Dice + Aux deep supervision)
loss:
  focal_weight: 1.0
  dice_weight: 1.0
  aux_weight: 0.3      # reduced from 1.0 — was dominating 77% of total loss
  prompt_weight: 0.5   # V3: BCE+Dice on dense_prompt projection → class-spatial supervision
  focal_gamma: 5.0
  focal_eps: 1.0e-4

train:
  epochs: 50
  episodes_per_epoch: 200
  lr: 1.0e-4
  sam_decoder_lr_mult: 0.1
  weight_decay: 1.0e-4
  grad_clip: 1.0
  device: cuda
  use_cat_adapter: false

# Semantic evaluation (mIoU + FB-IoU)
eval:
  score_thr: 0.3

seed: 42
output_dir: runs
